# ============================================================
# AslamSys — Mordomo Shared Infrastructure (Production)
# On the server: docker compose up -d
# ============================================================

services:

  nats:
    image: nats:latest
    container_name: nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-jetstream:/data/jetstream
    networks:
      - mordomo-net
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 15s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-aslam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-aslam}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mordomo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aslam}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    networks:
      - mordomo-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - mordomo-net

  consul:
    image: hashicorp/consul:latest
    container_name: consul
    restart: unless-stopped
    command: ["agent", "-config-file=/consul/config/consul.hcl"]
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - ./consul/consul.hcl:/consul/config/consul.hcl:ro
      - consul-data:/consul/data
    networks:
      - mordomo-net

  llm-gateway:
    image: calciumion/new-api:latest
    container_name: llm-gateway
    restart: unless-stopped
    ports:
      - "4000:3000"
    volumes:
      - ./one-api:/data
    environment:
      - TZ=America/Sao_Paulo
      - SQL_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - NODE_TYPE=master
      - SESSION_SECRET=${LITELLM_MASTER_KEY} # Reusing key as secret
    networks:
      - mordomo-net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  nats-jetstream:
  consul-data:

networks:
  mordomo-net:
    external: true
