# Redis Configuration — AslamSys Infraestrutura
# Databases por responsabilidade (cada ecossistema usa o seu db, sem colisão):
#
#   db 0 — mordomo-brain    : sessões de conversa, contexto ativo
#   db 1 — mordomo-general  : cache de skills, rate limiting, locks distribuídos
#   db 2 — iot-state-cache  : estado atual de todos os dispositivos IoT
#   db 3 — investimentos     : cache de cotações, análises recentes
#   db 4 — seguranca         : cache de eventos, alertas recentes
#   db 5 — nas               : cache de índices de mídia

# ── Rede ──────────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ── Databases ─────────────────────────────────────────────────────────────────
databases 16

# ── Memória ───────────────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistência ──────────────────────────────────────────────────────────────
# RDB: snapshot periódico (tolerável perder < 5min de cache)
save 300 1
save 60  100
dbfilename dump.rdb
dir /data

# AOF desabilitado: Redis aqui é cache, não banco primário
appendonly no

# ── Performance ───────────────────────────────────────────────────────────────
tcp-keepalive 300
timeout 0
tcp-backlog 511

# ── Logs ──────────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
