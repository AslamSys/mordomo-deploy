# NATS Server Configuration — AslamSys / Orange Pi 5 Ultra
# Docs: https://docs.nats.io/running-a-nats-service/configuration

server_name: "aslam-nats"

host: "0.0.0.0"
port: 4222
http_port: 8222

# ─── Limits ───────────────────────────────────────────────────────────────────
max_connections: 1024
max_payload:     1MB
max_pending:     128MB
write_deadline:  "5s"

# ─── JetStream (persistent queues) ───────────────────────────────────────────
jetstream {
  store_dir:        "/data/jetstream"
  max_memory_store: 512MB
  max_file_store:   2GB
}

# ─── Logging ─────────────────────────────────────────────────────────────────
log_time: true
debug:    false
trace:    false

# ─── Authentication ───────────────────────────────────────────────────────────
# Descomente para habilitar autenticação por token:
# authorization {
#   token: "$NATS_AUTH_TOKEN"
# }
