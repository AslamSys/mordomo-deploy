x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  mordomo-audio-capture-vad:
    image: renaneunao/mordomo-audio-capture-vad:latest
    container_name: mordomo-audio-capture-vad
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  mordomo-wake-word-detector:
    image: renaneunao/mordomo-wake-word-detector:latest
    container_name: mordomo-wake-word-detector
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  mordomo-source-separation:
    image: renaneunao/mordomo-source-separation:latest
    container_name: mordomo-source-separation
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

#  mordomo-speaker-verification — descomente na primeira execução para o setup do admin.
#  Após o admin estar cadastrado, remova SETUP_MODE do .env e reinicie.
  mordomo-speaker-verification:
    image: renaneunao/mordomo-speaker-verification:latest
    container_name: mordomo-speaker-verification
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    volumes:
      - speaker-embeddings:/data/embeddings
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  mordomo-whisper-asr:
    image: renaneunao/mordomo-whisper-asr:latest
    container_name: mordomo-whisper-asr
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    volumes:
      - whisper-models:/app/models
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  mordomo-speaker-id-diarization:
    image: renaneunao/mordomo-speaker-id-diarization:latest
    container_name: mordomo-speaker-id-diarization
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    volumes:
      - speaker-profiles:/app/profiles
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  mordomo-tts-engine:
    image: renaneunao/mordomo-tts-engine:latest
    container_name: mordomo-tts-engine
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    volumes:
      - tts-models:/app/models
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  mordomo-audio-bridge:
    image: renaneunao/mordomo-audio-bridge:latest
    container_name: mordomo-audio-bridge
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    ports:
      - "3100:3100"
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  mordomo-visual-feedback:
    image: renaneunao/mordomo-visual-feedback:latest
    container_name: mordomo-visual-feedback
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    privileged: true        # acesso a GPIO/LED
    networks:
      - mordomo-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

volumes:
  speaker-profiles:
  speaker-embeddings:
  whisper-models:
  tts-models:

networks:
  mordomo-net:
    external: true
